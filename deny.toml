[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "deny"
ignore = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "OpenSSL",
]
unused-allowed-license = "warn"
unused-license-exception = "warn"
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"