<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAVAZZA_Roméo_Resume</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div id="generating-state"
        style="display: none; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; width: 100%; padding-top: 18vh; text-align: center; background: #fff;">
        <div
            style="background: #eef2ff; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
            <i data-lucide="sparkles" style="width: 24px; height: 24px; color: #0052ff;"></i>
        </div>
        <h2 style="font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 32px;">Écriture du CV Spark...</h2>
        <div
            style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; margin: 0 auto; padding: 0 40px;">
            <div class="skeleton-bar"
                style="height: 14px; border-radius: 4px; width: 100%; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear;">
            </div>
            <div class="skeleton-bar"
                style="height: 14px; border-radius: 4px; width: 90%; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear;">
            </div>
            <div class="skeleton-bar"
                style="height: 14px; border-radius: 4px; width: 75%; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear;">
            </div>
        </div>
        <style>
            @keyframes shimmer {
                0% {
                    background-position: -200% 0;
                }

                100% {
                    background-position: 200% 0;
                }
            }
        </style>
    </div>

    <div class="page-stage" id="cv-container">
        <main id="cv" class="a4-page">
            <!-- Header (Bubble Right, Photo Left) -->
            <header class="cv-header">
                <div class="profile-img-container">
                    <img src="assets/profile-picture.jpg" id="profile-img" alt="Profile">
                </div>
                <div class="header-overlay">
                    <div class="header-text">
                        <h1 id="name"></h1>
                        <p id="title" class="title-main"></p>
                        <p id="pitch"></p>
                        <div class="header-meta">
                            <p><strong id="duration-label"></strong> <span id="duration"></span></p>
                            <p><strong id="rhythm-label"></strong> <span id="rhythm"></span></p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- Sidebar with rounded border (Stuck to Left Margin) -->
                <aside class="sidebar-border">
                    <div class="sidebar-content">
                        <section class="section">
                            <h3 id="contact-title"></h3>
                            <div class="contact-info">
                                <div class="contact-item"><span id="location"></span></div>
                                <div class="contact-item"><span id="phone"></span></div>
                                <div class="contact-item"><span id="email"></span></div>
                                <div class="contact-item link"><img src="assets/web.png" class="icon-img"> <a
                                        id="website-link" href="#" target="_blank"><span id="website">Site
                                            web</span></a></div>
                                <div class="contact-item link"><img src="assets/linkedin.png" class="icon-img"> <a
                                        id="linkedin-link" href="#" target="_blank"><span
                                            id="linkedin">LinkedIn</span></a></div>
                                <div class="contact-item link"><img src="assets/github.png" class="icon-img"> <a
                                        id="github-link" href="#" target="_blank"><span id="github">GitHub</span></a>
                                </div>

                            </div>
                        </section>

                        <section class="section">
                            <h3 id="skills-title"></h3>
                            <div id="skills-container"></div>
                        </section>

                        <section class="section">
                            <h3 id="languages-title"></h3>
                            <div id="languages-container"></div>
                        </section>
                    </div>
                </aside>

                <!-- Main content -->
                <div class="main-body">
                    <section class="section">
                        <h2 id="experiences-title"></h2>
                        <div id="experiences-container" class="list-container"></div>
                    </section>

                    <section class="section">
                        <div id="projects-container" class="list-container"></div>
                    </section>


                    <section class="section">
                        <h2 id="education-title"></h2>
                        <div id="education-container" class="list-container"></div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="script.js?v=3"></script>
</body>

</html>
