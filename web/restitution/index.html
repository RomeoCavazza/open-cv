<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse de l'offre - RecruitAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Palette */
            --primary: #0052ff;
            --ink: #0f172a;
            --body: #475569;
            --muted: #94a3b8;
            --outline: #e2e8f0;
            --surface: #f8fafc;

            /* Modular Scale */
            --text-xs: 12px;
            --text-sm: 14px;
            --text-base: 16px;
            --text-lg: 20px;
            --text-xl: 24px;
            --text-2xl: 34px;

            /* Line Heights */
            --lh-tight: 1.1;
            --lh-base: 1.6;
            --lh-loose: 1.7;
            --lh-ui: 1.45;

            /* Weights */
            --weight-normal: 400;
            --weight-medium: 600;
            --weight-bold: 800;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #ffffff;
            color: var(--ink);
            font-size: var(--text-base);
            line-height: var(--lh-base);
            font-weight: var(--weight-normal);
            margin: 0;
            padding: 0;
        }

        body.is-framed {
            padding: 0 !important;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            gap: 64px;
        }

        /* --- HEADER --- */
        .header {
            margin-bottom: 8px;
        }

        h1 {
            font-size: var(--text-2xl);
            font-weight: var(--weight-bold);
            margin: 0 0 12px;
            letter-spacing: -0.03em;
            line-height: var(--lh-tight);
        }

        .meta {
            color: var(--body);
            font-size: var(--text-sm);
            font-weight: var(--weight-normal);
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: var(--lh-ui);
        }

        .meta a {
            color: var(--primary) !important;
            text-decoration: underline;
            font-weight: var(--weight-medium);
        }

        .meta a:hover {
            text-decoration: none !important;
        }

        /* --- SECTIONS --- */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .section-icon {
            color: var(--muted);
            width: 18px;
            height: 18px;
            stroke-width: 1.5;
        }

        .section-title {
            font-size: var(--text-xs);
            font-weight: var(--weight-bold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            margin: 0;
            line-height: var(--lh-ui);
        }

        .section-divider {
            flex: 1;
            height: 1px;
            background: var(--outline);
        }

        .deep-text {
            font-size: var(--text-base);
            color: var(--ink);
            line-height: var(--lh-loose);
            white-space: pre-wrap;
        }

        .grid-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 24px;
        }

        .grid-item {
            font-size: var(--text-base);
            color: var(--body);
            line-height: var(--lh-base);
            display: flex;
            align-items: flex-start;
        }

        .sub-heading {
            font-size: var(--text-xs);
            font-weight: var(--weight-bold);
            color: var(--ink);
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
            opacity: 0.7;
            line-height: var(--lh-ui);
        }

        /* --- STATES --- */
        #loading-state,
        #generating-state,
        #empty-state,
        #restitution-content {
            display: none;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .skeleton-bar {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        .grid-item.point-fort::before {
            content: "✓";
            color: #22c55e;
            font-weight: 800;
            font-size: 14px;
            margin-right: 10px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .grid-item.point-vigilance::before {
            content: "✕";
            color: #ef4444;
            font-weight: 800;
            font-size: 12px;
            margin-right: 10px;
            flex-shrink: 0;
            margin-top: 3px;
        }

        .grid-item.point-bullet::before {
            content: "•";
            color: var(--muted);
            font-weight: 800;
            font-size: 18px;
            margin-right: 12px;
            flex-shrink: 0;
            margin-top: -2px;
        }
    </style>
</head>

<body>
    <div id="empty-state"
        style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; width: 100%; padding-top: 18vh; text-align: center;">
        <div
            style="width: 64px; height: 64px; background: #eff6ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; color: #0052ff;">
            <i data-lucide="file-search-2" style="width: 32px; height: 32px;"></i>
        </div>
        <h2 style="font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 12px;">Analyse non disponible</h2>
        <button id="btn-generate-restitution" onclick="handleGenerate()"
            style="background: var(--primary); color: white; border: none; padding: 12px 32px; border-radius: 12px; font-weight: var(--weight-medium); cursor: pointer;">Générer
            l'analyse</button>
    </div>

    <div id="generating-state"
        style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; width: 100%; padding-top: 18vh; text-align: center;">
        <div
            style="background: #eef2ff; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
            <i data-lucide="sparkles" style="width: 24px; height: 24px; color: var(--primary);"></i>
        </div>
        <h2 style="font-size: var(--text-lg); font-weight: var(--weight-bold); color: var(--ink); margin-bottom: 32px;">
            Analyse en cours...</h2>
        <div style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; margin: 0 auto;">
            <div class="skeleton-bar" style="height: 14px; border-radius: 4px; width: 100%;"></div>
            <div class="skeleton-bar" style="height: 14px; border-radius: 4px; width: 90%;"></div>
            <div class="skeleton-bar" style="height: 14px; border-radius: 4px; width: 75%;"></div>
        </div>
    </div>

    <div id="restitution-content">
        <div class="container">
            <div class="header">
                <h1 id="offre-titre"></h1>
                <div id="offre-meta" class="meta"></div>
            </div>

            <section>
                <div class="section-header">
                    <i data-lucide="brain-circuit" class="section-icon"></i>
                    <h2 class="section-title">Compréhension & Enjeux</h2>
                    <div class="section-divider"></div>
                </div>
                <div id="val-synthese" class="deep-text"></div>
            </section>

            <section>
                <div class="section-header">
                    <i data-lucide="briefcase" class="section-icon"></i>
                    <h2 class="section-title">Missions & Réalité du terrain</h2>
                    <div class="section-divider"></div>
                </div>
                <div id="list-missions" class="grid-list"></div>
            </section>

            <section>
                <div class="section-header">
                    <i data-lucide="user-cog" class="section-icon"></i>
                    <h2 class="section-title">Profil & Mindset attendus</h2>
                    <div class="section-divider"></div>
                </div>
                <div id="val-profil" class="deep-text" style="margin-bottom: 24px;"></div>
                <div class="sub-heading">Exigences & Soft Skills</div>
                <div id="list-exigences" class="grid-list"></div>
            </section>

            <section>
                <div class="section-header">
                    <i data-lucide="binary" class="section-icon"></i>
                    <h2 class="section-title">Stack & Expertise Déduite</h2>
                    <div class="section-divider"></div>
                </div>
                <div id="list-stack" class="grid-list"></div>
            </section>

            <section>
                <div class="section-header">
                    <i data-lucide="shield-alert" class="section-icon"></i>
                    <h2 class="section-title">Points de Vigilance & Risques</h2>
                    <div class="section-divider"></div>
                </div>
                <div class="grid-list" style="gap: 48px;">
                    <div>
                        <div class="sub-heading">Points Forts</div>
                        <div id="list-forces" class="grid-list"></div>
                    </div>
                    <div>
                        <div class="sub-heading">Vigilance</div>
                        <div id="list-risques" class="grid-list"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const offerSlug = urlParams.get('offer') || urlParams.get('offre');
        const instanceSlug = urlParams.get('instance') || urlParams.get('id');
        let pollInterval = null;

        async function init() {
            if (!offerSlug) return;
            if (window.self !== window.top) document.body.classList.add('is-framed');
            await checkStatus();
            lucide.createIcons();
        }

        async function checkStatus() {
            try {
                const [resOffre, resInstance] = await Promise.all([
                    fetch(`/api/offres/${offerSlug}`),
                    instanceSlug ? fetch(`/api/instances/${instanceSlug}?t=${Date.now()}`) : fetch(`/api/offres/${offerSlug}/instance?t=${Date.now()}`)
                ]);
                if (!resOffre.ok) return;
                const offre = await resOffre.json();
                document.getElementById('offre-titre').innerText = offre.intitule;
                const metaEl = document.getElementById('offre-meta');
                metaEl.replaceChildren();
                const metaParts = [];
                if (offre.entreprise) metaParts.push(offre.entreprise);
                if (offre.localisation) metaParts.push(offre.localisation);
                metaParts.forEach((part, index) => {
                    if (index > 0) metaEl.appendChild(document.createTextNode(' · '));
                    metaEl.appendChild(document.createTextNode(part));
                });
                if (offre.source_url) {
                    if (metaParts.length) metaEl.appendChild(document.createTextNode(' · '));
                    const link = document.createElement('a');
                    // Nettoyage robuste : on cherche la dernière URL valide dans la chaîne
                    const rawUrl = offre.source_url;
                    const matches = rawUrl.match(/https?:\/\/[^\s\]\)]+/g);
                    const cleanUrl = matches ? matches[matches.length - 1] : rawUrl;
                    link.href = cleanUrl;
                    link.target = '_blank';
                    link.rel = 'noreferrer';
                    link.textContent = "Visiter l'offre";
                    metaEl.appendChild(link);
                }

                if (resInstance.ok) {
                    const instance = await resInstance.json();
                    const status = (instance.status || '').toLowerCase();
                    let genTarget = { restitution: true }; // default
                    try {
                        const stored = localStorage.getItem('generating_target_' + instance.id) 
                                    || localStorage.getItem('generating_target_' + instance.slug)
                                    || localStorage.getItem('generating_target_' + instance.offre_id);
                        if (stored) genTarget = JSON.parse(stored);
                    } catch(e) {}

                    if (instance.restitution) {
                        if (genTarget.restitution) {
                            genTarget.restitution = false;
                            localStorage.setItem('generating_target_' + instance.slug, JSON.stringify(genTarget));
                        }
                        renderRestitution(instance.restitution);
                        showContent();
                        if (pollInterval) { clearInterval(pollInterval); pollInterval = null; import('../assets/js/render/audio.js').then(m => m.playSuccessSound()); }
                    } else if (genTarget.restitution) {
                        if (status === 'failed') {
                            genTarget.restitution = false;
                            localStorage.setItem('generating_target_' + instance.slug, JSON.stringify(genTarget));
                            showEmpty(false);
                            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
                        } else {
                            showGenerating();
                            if (!pollInterval) pollInterval = setInterval(checkStatus, 2000);
                        }
                    } else {
                        showEmpty(false);
                        if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
                    }
                } else {
                    showEmpty();
                    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
                }
            } catch (e) { console.error(e); }
        }

        function renderRestitution(r) {
            document.getElementById('val-synthese').innerText = r.synthese;
            document.getElementById('val-profil').innerText = r.profil_recherche;
            renderGridList('list-missions', r.missions, 'point-bullet');
            renderGridList('list-exigences', r.exigences, 'point-bullet');
            renderGridList('list-stack', r.stack_technique, 'point-bullet');
            renderGridList('list-forces', r.forces, 'point-fort');
            renderGridList('list-risques', r.faiblesses, 'point-vigilance');
            lucide.createIcons();
        }

        function renderGridList(id, items, extraClass = "") {
            const el = document.getElementById(id);
            if (!el) return;
            el.innerHTML = '';
            (items || []).forEach(t => {
                const div = document.createElement('div');
                div.className = 'grid-item ' + extraClass;
                div.innerText = t;
                el.appendChild(div);
            });
        }

        async function handleGenerate() {
            try {
                let existingOpts = {};
                try {
                    existingOpts = JSON.parse(localStorage.getItem('generating_target_' + (instanceSlug || offerSlug)) || '{}');
                } catch(e) {}
                const targetOptions = { 
                    restitution: true, 
                    resume: existingOpts.resume || false, 
                    cover_letter: existingOpts.cover_letter || false 
                };
                localStorage.setItem('generating_target_' + (instanceSlug || offerSlug), JSON.stringify(targetOptions));
            } catch(e) {}
            showGenerating();
            const target = instanceSlug ? `/api/instances/${instanceSlug}/generate?restitution=true&resume=false&cover_letter=false` : `/api/offres/${offerSlug}/generate`;
            await fetch(target, { method: 'POST' });
            if (!pollInterval) pollInterval = setInterval(checkStatus, 2000);
        }

        function showGenerating() {
            document.getElementById('generating-state').style.display = 'flex';
            document.getElementById('restitution-content').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';
        }
        function showEmpty(isInstanceGenerating = false) {
            document.getElementById('empty-state').style.display = 'flex';
            document.getElementById('restitution-content').style.display = 'none';
            document.getElementById('generating-state').style.display = 'none';
        }
        function showContent() {
            document.getElementById('restitution-content').style.display = 'block';
            document.getElementById('generating-state').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';
        }
        init();
    </script>
</body>

</html>
