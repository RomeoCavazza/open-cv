<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAVAZZA_Roméo_Cover_Letter</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div id="generating-state"
        style="display: none; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; width: 100%; padding-top: 18vh; text-align: center; background: #fff;">
        <div
            style="background: #eef2ff; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
            <i data-lucide="sparkles" style="width: 24px; height: 24px; color: #0052ff;"></i>
        </div>
        <h2 style="font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 32px;">Rédaction de la Lettre
            Spark...</h2>
        <div
            style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; margin: 0 auto; padding: 0 40px;">
            <div class="skeleton-bar"
                style="height: 14px; border-radius: 4px; width: 100%; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear;">
            </div>
            <div class="skeleton-bar"
                style="height: 14px; border-radius: 4px; width: 90%; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear;">
            </div>
            <div class="skeleton-bar"
                style="height: 14px; border-radius: 4px; width: 75%; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear;">
            </div>
        </div>
        <style>
            @keyframes shimmer {
                0% {
                    background-position: -200% 0;
                }

                100% {
                    background-position: 200% 0;
                }
            }
        </style>
    </div>

    <div class="page-stage" id="cl-container">
        <main id="cl" class="a4-page">
            <header class="cl-header">
                <div class="author-block">
                    <h1 id="author-name"></h1>
                    <div class="author-contact">
                        <div id="author-address"></div>
                        <div id="author-phone"></div>
                        <div id="author-email"></div>
                    </div>
                    <div class="author-links">
                        <a id="author-linkedin" href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                        <span class="divider">|</span>
                        <a id="author-github" href="#" target="_blank" rel="noopener noreferrer">GitHub</a>
                        <span class="divider">|</span>
                        <a id="author-website" href="#" target="_blank" rel="noopener noreferrer">Site web</a>
                    </div>
                </div>
                <div class="letter-meta">
                    <div id="letter-company"></div>
                    <div id="letter-date"></div>
                </div>
            </header>

            <section class="cl-body">
                <h2 id="letter-subject"></h2>
                <p id="letter-greeting"></p>
                <div id="letter-paragraphs"></div>
                <p id="letter-closing" class="closing"></p>
                <p id="letter-signature" class="signature"></p>
            </section>
        </main>
    </div>

    <script type="module" src="script.js?v=2"></script>
    <script>
        if (window.lucide) {
            window.lucide.createIcons();
        } else {
            document.addEventListener(
                "DOMContentLoaded",
                () => window.lucide && window.lucide.createIcons(),
            );
        }
    </script>
</body>

</html>
