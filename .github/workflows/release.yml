name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
      - name: Build release
        run: cargo build --release --workspace
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/api
            target/release/seed_blank
            target/release/seed_profile
            target/release/seed_offers_instances
            target/release/seed_chunks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
