# Project identification
sonar.projectKey=RomeoCavazza_recruit-ai
sonar.projectName=RecruitAI
sonar.projectVersion=1.0

# Source paths
sonar.sources=crates,web
sonar.exclusions=target/**,node_modules/**,**/*.test.rs,crates/adapters/**/tests/**

# Languages
sonar.language=rust,js,css

# Test coverage (integration with tarpaulin)
sonar.rust.coverage.reportPaths=target/tarpaulin/tarpaulin-report.xml

# JS Linting
sonar.eslint.reportPaths=target/eslint-report.json
