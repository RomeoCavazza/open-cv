<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV & Lettre de Motivation</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --page-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        body {
            background: var(--bg-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-wrapper {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .iframe-container {
            position: relative;
            /* A4 Ratio: 210/297 = 0.707 */
            aspect-ratio: 210 / 297;
            height: 90vh;
            max-width: 95vw;
            background: white;
            box-shadow: var(--page-shadow);
            border-radius: 4px;
            overflow: hidden;
        }
        iframe {
            width: 210mm;
            height: 297mm;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            display: none;
        }
        iframe.active {
            display: block;
        }
        .nav-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            margin-bottom: 10px;
            z-index: 10;
        }
        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #d1d5db;
            transition: background 0.2s;
            cursor: pointer;
        }
        .dot.active {
            background: #2563eb;
        }
        .dot:hover:not(.active) {
            background: #9ca3af;
        }
        .actions {
            margin-bottom: 20px;
        }
        .download-btn {
            background: #1e293b;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }
        .download-btn:hover {
            background: #334155;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="actions">
            <button id="download-btn" class="download-btn">
                <span>Télécharger en PDF (A4)</span>
            </button>
        </div>
        <div class="iframe-container" id="container">
            <iframe id="iframe-resume" src="resume/index.html" class="active"></iframe>
            <iframe id="iframe-cover" src="cover-letter/index.html"></iframe>
        </div>
        <div class="nav-dots">
            <div class="dot active" data-target="resume" title="CV"></div>
            <div class="dot" data-target="cover" title="Lettre de Motivation"></div>
        </div>
    </div>
    <script>
        const container = document.getElementById('container');
        const iframes = {
            resume: document.getElementById('iframe-resume'),
            cover: document.getElementById('iframe-cover')
        };
        const dots = document.querySelectorAll('.dot');

        function updateScaling() {
            const containerWidth = container.clientWidth;
            const targetWidth = 210 * 3.7795275591; // 210mm in pixels at 96dpi

            const scale = containerWidth / targetWidth;
            
            Object.values(iframes).forEach(iframe => {
                iframe.style.transform = `scale(${scale})`;
            });
        }

        window.addEventListener('resize', updateScaling);
        window.addEventListener('load', updateScaling);
        // Trigger once immediately
        setTimeout(updateScaling, 100);

        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                const target = dot.dataset.target;
                dots.forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                
                iframes.resume.classList.toggle('active', target === 'resume');
                iframes.cover.classList.toggle('active', target === 'cover');
                updateScaling();
            });
        });

        document.getElementById('download-btn').addEventListener('click', () => {
            const activeIframe = Object.values(iframes).find(f => f.classList.contains('active'));
            if (activeIframe) {
                activeIframe.contentWindow.print();
            }
        });
    </script>
</body>
</html>
