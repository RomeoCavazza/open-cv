<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV & Lettre de Motivation</title>
    <style>
        body {
            background: #e2e8f0;
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .iframe-container {
            width: 900px;
            max-width: 100vw;
            min-height: 1200px;
            margin: 8px 0 0 0; /* Réduit l'espace au-dessus */
            background: none;
            border: none;
        }
        iframe {
            width: 100%;
            min-height: 1200px;
            border: none;
            background: none;
            display: none;
        }
        iframe.active {
            display: block;
        }
        .nav-dots {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0 0 0; /* Réduit l'espace sous l'iframe */
        }
        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #d1d5db;
            transition: background 0.2s;
            cursor: pointer;
        }
        .dot.active {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe id="iframe-resume" src="resume/index.html" class="active"></iframe>
        <iframe id="iframe-cover" src="cover-letter/index.html"></iframe>
        <div class="nav-dots">
            <div class="dot active" data-target="resume"></div>
            <div class="dot" data-target="cover"></div>
        </div>
    </div>
    <script>
        const dots = document.querySelectorAll('.dot');
        const iframes = {
            resume: document.getElementById('iframe-resume'),
            cover: document.getElementById('iframe-cover')
        };
        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                dots.forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                iframes.resume.classList.toggle('active', dot.dataset.target === 'resume');
                iframes.cover.classList.toggle('active', dot.dataset.target === 'cover');
            });
        });
    </script>
</body>
</html>
