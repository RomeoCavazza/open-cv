<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAVAZZA_Roméo_Cover_Letter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="no-print actions">
        <button id="download-pdf" class="btn">
            <i data-lucide="download"></i> Download PDF (A4)
        </button>
    </div>

    <main id="cl" class="a4-page">
        <div class="cl-content" style="padding: 50px 50px 0 50px; flex: 1; display: flex; flex-direction: column; justify-content: flex-start;">
            <h1 style="margin-bottom: 20px;">Lettre de Motivation</h1>
            <p style="font-size: 1.1rem; line-height: 1.8;">
                Madame, Monsieur,<br><br>
                [Le contenu de votre lettre viendra ici]<br><br>
                Ce moteur est prêt pour le rendu typographique de vos motivations.
            </p>
        </div>
    </div>

    <script src="script.js"></script>
        <script>
            if (window.lucide) window.lucide.createIcons();
            else document.addEventListener('DOMContentLoaded', () => window.lucide && window.lucide.createIcons());
        </script>
</body>
</html>
