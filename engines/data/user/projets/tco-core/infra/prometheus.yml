global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # --- Hardware du Pi ---
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # --- Services TPU ---
  - job_name: 'influxdb'
    static_configs:
      - targets: ['influxdb:8086']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # --- Monitoring du Monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # --- Logs Stack ---
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail:9080']
