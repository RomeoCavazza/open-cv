services:
  # --- Base de données Capteurs ---
  influxdb:
    image: influxdb:1.8
    container_name: tpu-influx
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=tpu_db
    restart: unless-stopped
    networks:
      - tpu-net

  # --- Visualisation ---
  grafana:
    image: grafana/grafana:latest
    container_name: tpu-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    networks:
      - tpu-net

  # --- Monitoring Système (Santé du Pi) ---
  prometheus:
    image: prom/prometheus
    container_name: tpu-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - tpu-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: tpu-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)'
    restart: unless-stopped
    networks:
      - tpu-net

  # --- Logs Management ---
  loki:
    image: grafana/loki:2.9.2
    container_name: tpu-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - tpu-net

  promtail:
    image: grafana/promtail:2.9.2
    container_name: tpu-promtail
    user: "0:0"
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers
    command: -config.file=/etc/promtail/config.yml -client.url=http://loki:3100/loki/api/v1/push
    restart: unless-stopped
    networks:
      - tpu-net

networks:
  tpu-net:
    driver: bridge

volumes:
  grafana_data:
    external: true
    name: infra_grafana_data
  influxdb_data:
    external: true
    name: infra_influxdb_data
  prometheus_data:
    external: true
    name: infra_prometheus_data

